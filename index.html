<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estimator Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 font-sans">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg border border-gray-200">
        <h2 class="text-2xl font-bold mb-4 border-b pb-2 text-gray-800">Manajemen Dokumen & BOQ</h2>
        
        <form id="uploadForm" class="flex flex-wrap gap-4 mb-8 bg-blue-50 p-5 rounded-lg border border-blue-100">
            <input type="file" id="fileInput" required class="border p-2 bg-white rounded flex-1 min-w-[200px]">
            <select id="inputProject" required class="border p-2 rounded">
                <option value="Proyek A">Proyek A</option>
                <option value="Proyek B">Proyek B</option>
            </select>
            <select id="inputCategory" required class="border p-2 rounded">
                <option value="BOQ">BOQ (Excel)</option>
                <option value="Gambar">Gambar (CAD/PDF)</option>
            </select>
            <select id="inputUser" required class="border p-2 rounded">
                <option value="Tim Estimator">Tim Estimator</option>
            </select>
            <button type="submit" id="btnSubmit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-bold shadow transition">Unggah File</button>
        </form>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse border border-gray-200">
                <thead class="bg-gray-100 text-sm text-gray-700 uppercase">
                    <tr>
                        <th class="p-3 border font-semibold">Nama File</th>
                        <th class="p-3 border font-semibold">Proyek</th>
                        <th class="p-3 border font-semibold">Kategori</th>
                        <th class="p-3 border font-semibold">Tanggal</th>
                        <th class="p-3 border text-center font-semibold">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-gray-600 text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        // GANTI BAGIAN INI DENGAN LINK RENDER ANDA
        const BACKEND_URL = "https://backend-estimator-production-d0e4.up.railway.app"; 

        async function loadFiles() {
            try {
                const res = await fetch(`${BACKEND_URL}/files`);
                const data = await res.json();
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3 font-medium text-gray-900">${item.name}</td>
                            <td class="p-3">${item.project}</td>
                            <td class="p-3">${item.category}</td>
                            <td class="p-3">${item.date}</td>
                            <td class="p-3 text-center">
                                <a href="${BACKEND_URL}/download/${item.id}" class="text-white bg-green-500 hover:bg-green-600 px-4 py-1.5 rounded shadow text-sm font-bold transition">
                                    Unduh
                                </a>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { console.error("Gagal memuat data", err); }
        }

        document.getElementById("uploadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit");
            btn.innerText = "Mengunggah...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", document.getElementById("fileInput").files[0]);
            formData.append("project", document.getElementById("inputProject").value);
            formData.append("category", document.getElementById("inputCategory").value);
            formData.append("user", document.getElementById("inputUser").value);

            try {
                const res = await fetch(`${BACKEND_URL}/upload`, { method: 'POST', body: formData });
                const result = await res.json();
                if(result.status === 'success') {
                    alert('File berhasil diunggah!');
                    loadFiles();
                } else {
                    alert('Gagal mengunggah file.');
                }
            } catch (err) { alert('Terjadi kesalahan jaringan.'); }
            
            btn.innerText = "Unggah File";
            btn.disabled = false;
            document.getElementById("uploadForm").reset();
        });

        loadFiles();
    </script>
</body>
</html>
